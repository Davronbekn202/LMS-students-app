{% extends 'base.html' %}
{% block content %}
login
<form method="post" enctype="multipart/form-data">
    {{ form.as_p }}
    {% csrf_token %}
    <button type="submit">send</button>

    {% if request.user.is_authenticated and request.user.is_superuser %}
    <a href="{% url 'accounts:register' %}">Register</a>
    {% endif %}

</form>
{% endblock %}
