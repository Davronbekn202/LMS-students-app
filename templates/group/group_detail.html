{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
  <div class="row">

    <!-- CHAP: ALL STUDENTS -->
    <div class="col-md-6">
      <h4>Barcha studentlar</h4>
      <div class="card p-3 shadow-sm" style="max-height: 500px; overflow-y: auto;">
        <table class="table table-hover" id="studentsTable">
          <thead>
            <tr>
              <th>Select</th>
              <th>Student</th>
            </tr>
          </thead>
          <tbody>
            {% for student in students %}
            <tr data-id="{{ student.id }}">
              <td><input type="checkbox" class="student-check" value="{{ student.id }}"></td>
              <td class="student-name">{{ student.user.username }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <button id="addToGroupBtn" class="btn btn-primary mt-3">Add Selected to Group</button>
    </div>

    <!-- O'NG: GROUP PANEL (visual only until Save) -->
    <div class="col-md-6">
      <h4>Group: {{ group.name }}</h4>
      <div class="card p-3 shadow-sm" style="min-height: 300px;">
        <ul id="groupList" class="list-group">
          <!-- Bu yerga JS vizual elementlarni qo'shadi -->
        </ul>
      </div>

      <div class="mt-3">
        <button id="saveGroupBtn" class="btn btn-success">Save</button>
        <button id="cancelBtn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

  </div>
</div>

<script>
  // Tanlangan (visual) IDlar - front-endda saqlanadi
  let stagedStudentIds = [];

  const csrftoken = "{{ csrf_token }}";  // template CSRF token

  // Add Selected -> o'ng panelga ko'chiradi (faqat vizual)
  document.getElementById("addToGroupBtn").addEventListener("click", () => {
    const checkedBoxes = document.querySelectorAll(".student-check:checked");
    const groupList = document.getElementById("groupList");

    checkedBoxes.forEach(cb => {
      const tr = cb.closest("tr");
      const id = cb.value;
      const name = tr.querySelector(".student-name").innerText.trim();

      // Agar allaqachon qoshilgan bo'lsa o'tkazib yubor
      if (stagedStudentIds.includes(id)) {
        tr.remove(); // optional: olib qo'yish - yoki faqat checkboxni o'chirish
        return;
      }

      // Vizual: o'ng listga element qo'shish
      const li = document.createElement("li");
      li.className = "list-group-item d-flex justify-content-between align-items-center";
      li.dataset.id = id;
      li.innerHTML = `<span>${name}</span>
                      <div>
                        <button class="btn btn-sm btn-outline-danger btn-remove">Remove</button>
                      </div>`;

      groupList.appendChild(li);

      // staged list ga qo'shamiz
      stagedStudentIds.push(id);

      // Chap jadvaldan o'chirib tashlamaymiz (so'raganingiz bo'yicha) —
      // ammo checkboxni olib tashlash yoki disabled qilish tavsiya etiladi:
      tr.remove(); // agar istasangiz chapdan to'liq yo'q bo'lsin: saqlab qo'ydim sizga - lekin uni qaytarish uchun Cancel/revert imkoniyati bo'lishi kerak
    });

    // Tugmalarni holatini yangilash
    updateButtonsState();
  });

  // Delegate remove tugmasi - o'ng paneldan elementni qaytarish
  document.getElementById("groupList").addEventListener("click", (e) => {
    if (e.target.classList.contains("btn-remove")) {
      const li = e.target.closest("li");
      const id = li.dataset.id;

      // staged list dan olib tashlash
      stagedStudentIds = stagedStudentIds.filter(x => x !== id);

      // o'ngdan o'chirish vizual
      li.remove();

      // Chapga original rowni qaytarish (agar kerak bo'lsa)
      // Agar siz chapdagi elementni DOMdan olib tashlagan bo'lsangiz, serverdan qayta yuklash kerak bo'ladi.
      // Lekin biz oldin tr.remove() qildik - shu sabab qaytarish uchun backend yoki sahifani reload qilish kerak bo'ladi.
      // Bu yerda biz hech narsa qilmaymiz (oddiy UX: Cancel -> sahifani reload qiladi)
      updateButtonsState();
    }
  });

  // Save tugmasi - serverga POST qilib yozadi (DB ga)
  document.getElementById("saveGroupBtn").addEventListener("click", () => {
    if (stagedStudentIds.length === 0) {
      alert("Hech narsa tanlanmadi.");
      return;
    }

    fetch("{% url 'add-student-group' group.pk %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrftoken
      },
      body: JSON.stringify({ student_ids: stagedStudentIds })
    })
    .then(response => {
      if (!response.ok) throw new Error("Network response was not ok");
      return response.json();
    })
    .then(data => {
      if (data.status === "success") {
        alert("Students saved to group successfully.");
        // Agar kerak bo'lsa sahifani yangilash yoki o'ng panelni yangilash:
        window.location.reload(); // eng oddiy va ishonchli — yangi holatni yuklash uchun
      } else {
        alert("Xatolik: " + (data.error || "Noma'lum"));
      }
    })
    .catch(err => {
      console.error(err);
      alert("Server bilan bog'lanishda xatolik yuz berdi.");
    });
  });

  // Cancel tugmasi - revert (sahifani reload qilish orqali original holatga qaytish)
  document.getElementById("cancelBtn").addEventListener("click", () => {
    if (confirm("Bekor qilinsinmi? Saqlanmagan o'zgarishlar yo'qoladi.")) {
      window.location.reload();
    }
  });

  function updateButtonsState() {
    const saveBtn = document.getElementById("saveGroupBtn");
    saveBtn.disabled = stagedStudentIds.length === 0;
  }

  // boshlang'ich holat
  updateButtonsState();
</script>

{% endblock %}
